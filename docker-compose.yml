# ===============================================================
#  NutriFlow — environnement DEV
#  Usage : docker-compose up -d
#  Profil Spring : dev (seed auto, SQL visible, auth simplifiée)
# ===============================================================

services:
  frontend:
    image: node:20-alpine
    container_name: nutriflow-frontend
    working_dir: /app
    volumes:
      - ./FrontEnd:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    environment:
      NEXT_PUBLIC_API_URL: http://host.docker.internal:8080
    ports:
      - "3000:3000"

  db:
    image: postgres:15-alpine
    container_name: nutriflow-db
    environment:
      POSTGRES_DB: nutriflow_db
      POSTGRES_USER: nael
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nael -d nutriflow_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4
    container_name: nutriflow-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: nael@nutri.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8081:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  frontend_node_modules:
  postgres_data:
