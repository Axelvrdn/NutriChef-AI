version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: nutriflow-db
    environment:
      POSTGRES_DB: nutriflow_db
      POSTGRES_USER: nael
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: nutriflow-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: nael@nutri.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8081:80"
    depends_on:
      - db

volumes:
  postgres_data: