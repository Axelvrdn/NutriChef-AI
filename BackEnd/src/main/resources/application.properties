spring.application.name=backend

# -------------------------------------------------------
# Profil actif — changer ici ou via variable d'env :
#   SPRING_PROFILES_ACTIVE=prod  (Docker / CI / serveur)
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=prod
# -------------------------------------------------------
spring.profiles.active=dev

# Config commune (surchargée par le profil actif)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT commun
nutriflow.jwt.access-token-expiration-ms=900000
nutriflow.jwt.refresh-token-expiration-ms=604800000
