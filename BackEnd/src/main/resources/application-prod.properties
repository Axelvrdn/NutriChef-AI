# =======================================================
#  PROFIL PROD
#  - BDD via variables d'environnement (jamais en dur ici)
#  - Schéma en mode validate : Hibernate ne modifie rien,
#    les migrations Flyway doivent être à jour
#  - Aucun SQL dans les logs
#  - Seed désactivé
#  - Auth stricte (JWT obligatoire)
# =======================================================

# Variables d'env injectées par Docker / CI / serveur
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}

# Hibernate ne touche pas au schéma — Flyway gère les migrations
spring.jpa.hibernate.ddl-auto=validate

# Pas de SQL dans les logs de production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging minimal
logging.level.com.nutriflow=INFO
logging.level.org.hibernate.SQL=WARN

nutriflow.security.enabled=true
nutriflow.seed.enabled=false
nutriflow.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
nutriflow.jwt.secret=${JWT_SECRET}

# Flyway prêt, activation à faire quand la migration V1 est finalisée
spring.flyway.enabled=false
