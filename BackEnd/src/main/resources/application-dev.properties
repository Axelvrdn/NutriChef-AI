# =======================================================
#  PROFIL DEV
#  - BDD locale Docker (docker-compose up -d db)
#  - Données de seed automatiques au démarrage
#  - SQL visible dans les logs, format lisible
#  - Auth simplifiée (pas de token requis pour les routes de test)
# =======================================================

# Base de données locale
spring.datasource.url=jdbc:postgresql://localhost:5432/nutriflow_db
spring.datasource.username=nael
spring.datasource.password=password123

# Hibernate : met à jour le schéma sans supprimer les données existantes.
# Le DataSeeder vérifie si la BDD est vide avant d'insérer.
spring.jpa.hibernate.ddl-auto=update

# SQL dans les logs (lisible)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.nutriflow=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Sécurité active aussi en dev (JWT)
nutriflow.security.enabled=true
nutriflow.seed.enabled=true
nutriflow.cors.allowed-origins=http://localhost:3000,http://localhost:5173
# Secret dev (64+ chars recommandé). A remplacer via env si besoin.
nutriflow.jwt.secret=dev-secret-change-me-please-dev-secret-change-me-please

# Flyway préparé mais non activé tant que le script V1 n'est pas complet
spring.flyway.enabled=false
